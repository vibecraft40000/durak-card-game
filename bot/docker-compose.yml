services:
  bot:
    build: .
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL:-https://durakonline.duckdns.org}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/webhook}
      HOST: 0.0.0.0
      PORT: 8081
    ports:
      - "8081:8081"
    restart: unless-stopped
