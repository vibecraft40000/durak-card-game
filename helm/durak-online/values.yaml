replicaCount: 2

image:
  repository: durak-online-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  PORT: "8080"
  PPROF_PORT: "6060"
  ALLOWED_ORIGIN: "*"
  MATCH_STATE_TTL: "2h"
  COMMISSION_BPS: "300"

secrets:
  postgresUrl: "postgres://durak:durak@postgres:5432/durak?sslmode=disable"
  redisUrl: "redis://redis:6379/0"
  jwtSecret: "dev-secret"
  telegramBotToken: "dev-bot-token"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

rollout:
  strategy: RollingUpdate
  maxSurge: 1
  maxUnavailable: 0

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  path: /live
  initialDelaySeconds: 10
  periodSeconds: 10

ingress:
  enabled: false
  className: ""
  host: durak.local
  path: /
