apiVersion: apps/v1
kind: Deployment
metadata:
  name: durak-api
  labels:
    app: durak-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: durak-api
  template:
    metadata:
      labels:
        app: durak-api
    spec:
      containers:
        - name: api
          image: durak-api:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: durak-secrets
                  key: postgres-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: durak-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: durak-secrets
                  key: jwt-secret
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: durak-secrets
                  key: telegram-bot-token
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
