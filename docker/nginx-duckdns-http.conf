# Temporary HTTP-only config for initial Certbot run
# Use this FIRST, then switch to nginx-duckdns.conf after getting cert

worker_processes auto;
events { worker_connections 16384; }
http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }
  upstream api_backend { server api:8080; keepalive 64; }

  server {
    listen 80;
    server_name durakonline.duckdns.org www.durakonline.duckdns.org;
    root /usr/share/nginx/html;
    index index.html;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location /api/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /auth/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /ws {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /health { proxy_pass http://api_backend; proxy_set_header Host $host; }
    location / { try_files $uri $uri/ /index.html; }
  }
}
