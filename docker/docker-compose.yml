services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: durak
      POSTGRES_USER: durak
      POSTGRES_PASSWORD: durak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U durak -d durak"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.3
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://durak:durak@postgres:5432/durak?sslmode=disable",
        "up",
      ]
    volumes:
      - ../backend/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: "api-1"
      PORT: "8080"
      PPROF_PORT: "6060"
      POSTGRES_URL: "postgres://durak:durak@postgres:5432/durak?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "dev-secret"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-dev-bot-token}"
      ALLOW_DEV_TELEGRAM_AUTH: "true"
      DISABLE_MONEY: "true"
      ROOM_WAIT_TIMEOUT: "5m"
      ALLOWED_ORIGIN: "*"
    ports:
      - "8080:8080"
      - "6060:6060"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  api2:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: "api-2"
      PORT: "8080"
      PPROF_PORT: "6060"
      POSTGRES_URL: "postgres://durak:durak@postgres:5432/durak?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "dev-secret"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-dev-bot-token}"
      ALLOW_DEV_TELEGRAM_AUTH: "true"
      DISABLE_MONEY: "true"
      ROOM_WAIT_TIMEOUT: "5m"
      ALLOWED_ORIGIN: "*"
    ports:
      - "8081:8080"
      - "6061:6060"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  lb:
    image: nginx:1.27-alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - api2

  test:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: test
    working_dir: /app
    environment:
      POSTGRES_URL: "postgres://durak:durak@postgres:5432/durak?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      INTEGRATION_PG_DSN: "postgres://durak:durak@postgres:5432/durak?sslmode=disable"
      INTEGRATION_REDIS_URL: "redis://redis:6379/0"
      CGO_ENABLED: "1"
    command: >
      sh -c "go test ./... && go test -race ./..."
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  k6:
    image: grafana/k6:latest
    working_dir: /work
    environment:
      BASE_URL: "http://lb"
      WS_URL: "ws://lb/ws"
      WS_TOKEN: "replace-with-jwt-token"
      ROOM_ID: "replace-with-room-id"
    volumes:
      - ../:/work
    depends_on:
      lb:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
      - api2

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
