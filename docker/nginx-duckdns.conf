# Nginx for durakonline.duckdns.org (DuckDNS + Let's Encrypt)
# Certs mounted from host: /etc/letsencrypt/live/durakonline.duckdns.org/

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 16384;
  multi_accept on;
}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  keepalive_timeout 65s;
  keepalive_requests 10000;
  sendfile on;

  upstream api_backend {
    server api:8080;
    keepalive 64;
  }

  server {
    listen 80;
    server_name durakonline.duckdns.org www.durakonline.duckdns.org;
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name durakonline.duckdns.org www.durakonline.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/durakonline.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/durakonline.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    location /auth/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    location /ws {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_connect_timeout 10s;
    }

    location /health {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
      expires 7d;
      add_header Cache-Control "public, immutable";
    }
  }
}
