# Copy to VPS: /etc/nginx/sites-available/durak-72-56-74-7.sslip.io
# Then: sudo ln -sf /etc/nginx/sites-available/durak-72-56-74-7.sslip.io /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

upstream durak_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name 72-56-74-7.sslip.io;
    location / {
        proxy_pass http://durak_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /api/ {
        proxy_pass http://durak_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /auth/ {
        proxy_pass http://durak_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /ws {
        proxy_pass http://durak_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }
    location /health {
        proxy_pass http://durak_app;
        proxy_set_header Host $host;
    }
}

server {
    listen 443 ssl;
    server_name 72-56-74-7.sslip.io;
    ssl_certificate /etc/letsencrypt/live/72-56-74-7.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/72-56-74-7.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://durak_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /api/ {
        proxy_pass http://durak_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /auth/ {
        proxy_pass http://durak_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /ws {
        proxy_pass http://durak_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }
    location /health {
        proxy_pass http://durak_app;
        proxy_set_header Host $host;
    }
}
