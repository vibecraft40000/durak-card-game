services:
  api:
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      ENV: "staging"
      ALLOWED_ORIGIN: "https://your-domain.example"
      JWT_SECRET: "${JWT_SECRET}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      ADMIN_SECRET: "${ADMIN_SECRET}"
      ALLOW_DEV_TELEGRAM_AUTH: "false"
