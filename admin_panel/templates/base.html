<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Админка — Дурак Онлайн{% endblock %}</title>
  <style>
    :root {
      --bg: #141726;
      --card: #1f2538;
      --text: #d6dbff;
      --muted: #8b96c9;
      --accent: #6da3ff;
      --danger: #ff6f87;
      --success: #66d89c;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #242f57 0%, var(--bg) 45%);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }

    nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    nav a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .nav-inline-form {
      margin: 0;
    }

    .nav-button {
      border: 0;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      padding: 0;
    }

    nav a:hover { text-decoration: underline; }
    .nav-button:hover { text-decoration: underline; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      padding: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      vertical-align: top;
    }

    th {
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }

    .pagination {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .pagination a,
    .pagination span {
      color: var(--accent);
      text-decoration: none;
    }

    .pagination .current { color: var(--text); }

    .stat {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin: 8px 0;
    }

    .error { color: var(--danger); }

    .flash {
      padding: 10px 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid transparent;
    }

    .flash.danger {
      background: rgba(255, 111, 135, 0.12);
      border-color: rgba(255, 111, 135, 0.35);
      color: var(--danger);
    }

    .flash.success {
      background: rgba(102, 216, 156, 0.12);
      border-color: rgba(102, 216, 156, 0.35);
      color: var(--success);
    }

    .flash.info {
      background: rgba(109, 163, 255, 0.12);
      border-color: rgba(109, 163, 255, 0.35);
      color: var(--accent);
    }

    .flash.warning {
      background: rgba(255, 202, 112, 0.12);
      border-color: rgba(255, 202, 112, 0.35);
      color: #ffd58f;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: var(--accent);
      color: #11152a;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.92; }

    .btn-danger {
      background: rgba(255, 111, 135, 0.12);
      border-color: rgba(255, 111, 135, 0.45);
      color: var(--danger);
    }

    .btn-success {
      background: rgba(102, 216, 156, 0.12);
      border-color: rgba(102, 216, 156, 0.45);
      color: var(--success);
    }

    .btn-muted {
      background: rgba(139, 150, 201, 0.15);
      border-color: rgba(139, 150, 201, 0.35);
      color: var(--text);
    }

    .inline-form {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0;
    }

    .table-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 280px;
    }

    input[type=text],
    input[type=password],
    input[type=number] {
      padding: 7px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #111628;
      color: var(--text);
      width: 100%;
      min-width: 120px;
    }

    .input-sm {
      width: 110px;
      min-width: 90px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
    }

    .form-group { margin-bottom: 10px; }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% if current_user.is_authenticated %}
  <nav>
    <a href="{{ url_for('dashboard.index') }}">Дашборд</a>
    <a href="{{ url_for('users.index') }}">Пользователи</a>
    <a href="{{ url_for('logs.index') }}">Логи</a>
    <a href="{{ url_for('settings.index') }}">Настройки</a>
    <form class="nav-inline-form" method="post" action="{{ url_for('auth.logout') }}">
      <input type="hidden" name="{{ csrf_field_name }}" value="{{ csrf_token() }}">
      <button type="submit" class="nav-button">Выход</button>
    </form>
  </nav>
  {% endif %}

  <div class="container">
    {% for category, message in get_flashed_messages(with_categories=true) %}
    <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
